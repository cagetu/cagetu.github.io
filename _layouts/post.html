---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <time class="post-date">{{ page.date | date: "%Y년 %m월 %d일" }}</time>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <nav class="post-nav">
    <a href="{{ '/' | relative_url }}">← 목록으로</a>
  </nav>
  <div class="comments">
    <script src="https://utteranc.es/client.js"
            repo="cagetu/cagetu.github.io"
            issue-term="pathname"
            theme="github-light"
            crossorigin="anonymous"
            async>
    </script>
  </div>
</article>
