<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <p class="site-desc">{{ site.description }}</p>
      <nav style="margin-top:8px;">
        <a href="{{ '/' | relative_url }}" style="font-size:13px; color:#666; text-decoration:none; margin-right:12px;">전체글</a>
        <a href="{{ '/categories/' | relative_url }}" style="font-size:13px; color:#666; text-decoration:none;">카테고리</a>
      </nav>
    </div>
  </header>

  <main class="wrapper">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <p>egloos 아카이브 (2005–2023)</p>
    </div>
  </footer>
</body>
</html>
